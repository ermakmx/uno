services:
  - type: web
    name: uno
    env: node
    region: ohio
    plan: free
    buildCommand: corepack enable && pnpm install && pnpm --filter @uno/shared build && pnpm --filter @uno/server build && pnpm --filter @uno/client build
    startCommand: node packages/server/dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
